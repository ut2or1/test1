name: Build K64FX512 Firmware

on:
  workflow_dispatch:
    inputs:
      compiler:
        description: 'Compiler'
        required: true
        type: choice
        default: 'gcc'
        options:
          - 'gcc'
          - 'clang'
          - 'both'
      toolchain_version:
        description: 'ARM GCC Toolchain Version'
        required: true
        type: choice
        default: '15.2.Rel1'
        options:
          - '10.3-2021.10'
          - '11.2-2022.02'
          - '12.2.Rel1'
          - '13.2.Rel1'
          - '13.3.Rel1'
          - '14.2.Rel1'
          - '15.2.Rel1'

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: make check

  build-gcc:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: inputs.compiler == 'gcc' || inputs.compiler == 'both'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and extract ARM GCC
        run: |
          VERSION="${{ inputs.toolchain_version }}"
          wget -q "https://developer.arm.com/-/media/Files/downloads/gnu/${VERSION}/binrel/arm-gnu-toolchain-${VERSION}-x86_64-arm-none-eabi.tar.xz" -O /tmp/gcc.tar.xz
          sudo tar -xf /tmp/gcc.tar.xz -C /opt
          rm /tmp/gcc.tar.xz
          GCC_DIR=$(ls -d /opt/arm-gnu-toolchain-*)
          echo "GCC_DIR=$GCC_DIR" >> $GITHUB_ENV
          echo "GCC found at: $GCC_DIR"

      - name: Build with GCC
        run: |
          make -j$(nproc) \
            CC="$GCC_DIR/bin/arm-none-eabi-gcc" \
            OBJCOPY="$GCC_DIR/bin/arm-none-eabi-objcopy" \
            SIZE="$GCC_DIR/bin/arm-none-eabi-size"

      - name: Upload GCC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: |
            build/*.elf
            build/*.bin

  build-clang:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: inputs.compiler == 'clang' || inputs.compiler == 'both'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LLVM/Clang
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y libstdc++-12-dev-armel-cross
          rm llvm.sh

      - name: Build with Clang
        run: make -j$(nproc) CC=clang-18 USE_CLANG=1

      - name: Upload Clang artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-clang
          path: |
            build/*.elf
            build/*.bin

  test:
    runs-on: ubuntu-latest
    needs: [build-gcc, build-clang]
    if: always() && (needs.build-gcc.result == 'success' || needs.build-clang.result == 'success')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Renode portable
        run: |
          wget -q https://github.com/renode/renode/releases/download/v1.16.1/renode-1.16.1.linux-portable.tar.gz
          tar -xzf renode-1.16.1.linux-portable.tar.gz
          echo "$(pwd)/renode_1.16.1_portable" >> $GITHUB_PATH
          rm renode-1.16.1.linux-portable.tar.gz

      - name: Verify Renode
        run: |
          which renode
          renode --version

      - name: Download GCC artifacts
        if: needs.build-gcc.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: build/

      - name: Download Clang artifacts
        if: needs.build-clang.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-clang
          path: build/

      - name: Run Renode tests
        run: renode test/k64_test.resc --console
