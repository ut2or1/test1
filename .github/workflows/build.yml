name: Build K64FX512 Firmware

on:
  workflow_dispatch:
    inputs:
      run_cppcheck:
        description: 'Run static analysis (cppcheck)'
        required: true
        type: choice
        default: 'no'
        options:
          - 'yes'
          - 'no'
      compiler:
        description: 'Compiler'
        required: true
        type: choice
        default: 'gcc'
        options:
          - 'gcc'
          - 'clang'
          - 'both'
      toolchain_version:
        description: 'ARM GCC Toolchain Version'
        required: true
        type: choice
        default: '15.2.Rel1'
        options:
          - '10.3-2021.10'
          - '11.2-2022.02'
          - '12.2.Rel1'
          - '13.2.Rel1'
          - '13.3.Rel1'
          - '14.2.Rel1'
          - '15.2.Rel1'
      clang_version:
        description: 'LLVM/Clang Version'
        required: true
        type: choice
        default: '19.1.0'
        options:
          - '19.1.0'
          - '20.1.0'
          - '21.1.0'
          - '22.1.0'

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    if: inputs.run_cppcheck == 'yes'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache cppcheck deb packages
        id: cache-cppcheck
        uses: actions/cache@v4
        with:
          path: /tmp/cppcheck-packages
          key: cppcheck-packages-${{ runner.os }}-${{ runner.arch }}

      - name: Download cppcheck and dependencies
        if: steps.cache-cppcheck.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/cppcheck-packages
          cd /tmp/cppcheck-packages
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends --download-only cppcheck
          cp /var/cache/apt/archives/*.deb /tmp/cppcheck-packages/

      - name: Install cppcheck from cached packages
        run: |
          if command -v cppcheck &> /dev/null; then
            echo "cppcheck already installed"
          elif [ -d "/tmp/cppcheck-packages" ] && [ -n "$(ls -A /tmp/cppcheck-packages/*.deb 2>/dev/null)" ]; then
            sudo dpkg -i --force-depends /tmp/cppcheck-packages/*.deb || true
            sudo apt-get install -f -y -qq --no-install-recommends
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends cppcheck
          fi

      - name: Run cppcheck
        run: make check

  build-gcc:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: |
      always() &&
      (needs.static-analysis.result == 'success' || needs.static-analysis.result == 'skipped') &&
      (inputs.compiler == 'gcc' || inputs.compiler == 'both')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache ARM GCC Toolchain
        id: cache-gcc
        uses: actions/cache@v4
        with:
          path: /tmp/gcc.tar.xz
          key: arm-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}

      - name: Download ARM GCC
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ inputs.toolchain_version }}"
          wget -q "https://developer.arm.com/-/media/Files/downloads/gnu/${VERSION}/binrel/arm-gnu-toolchain-${VERSION}-x86_64-arm-none-eabi.tar.xz" -O /tmp/gcc.tar.xz
          echo "Downloaded size:"
          ls -lh /tmp/gcc.tar.xz

      - name: Extract ARM GCC
        run: |
          tar -xf /tmp/gcc.tar.xz -C /tmp
          GCC_DIR=$(ls -d /tmp/arm-gnu-toolchain-*)
          echo "GCC_DIR=$GCC_DIR" >> $GITHUB_ENV
          echo "GCC extracted to: $GCC_DIR"

      - name: Cache ccache deb packages
        id: cache-ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache-packages
          key: ccache-packages-${{ runner.os }}-${{ runner.arch }}

      - name: Install ccache from cached packages
        run: |
          if command -v ccache &> /dev/null; then
            echo "ccache already installed"
          elif [ -d "/tmp/ccache-packages" ] && [ -n "$(ls -A /tmp/ccache-packages/*.deb 2>/dev/null)" ]; then
            sudo dpkg -i --force-depends /tmp/ccache-packages/*.deb || true
            sudo apt-get install -f -y -qq --no-install-recommends
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends --download-only ccache
            mkdir -p /tmp/ccache-packages
            cp /var/cache/apt/archives/*.deb /tmp/ccache-packages/
            sudo dpkg -i /tmp/ccache-packages/*.deb
          fi

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-obj-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ccache-obj-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}-

      - name: Build with GCC (ccache)
        run: |
          export PATH="$GCC_DIR/bin:$PATH"
          export CCACHE_DIR=$HOME/.ccache
          ccache -z > /dev/null
          make -j$(nproc)
          echo ""
          echo "=== ccache statistics ==="
          ccache -s

      - name: Upload GCC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: |
            build/*.elf
            build/*.bin

  build-clang:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: |
      always() &&
      (needs.static-analysis.result == 'success' || needs.static-analysis.result == 'skipped') &&
      (inputs.compiler == 'clang' || inputs.compiler == 'both')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Clang variables
        id: clang-vars
        run: |
          CLANG_VERSION="${{ inputs.clang_version }}"
          CLANG_PACKAGE="LLVM-${CLANG_VERSION}-Linux-X64"
          CLANG_ARCHIVE="${CLANG_PACKAGE}.tar.xz"
          CLANG_URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${CLANG_VERSION}/${CLANG_ARCHIVE}"

          echo "clang_version=${CLANG_VERSION}" >> $GITHUB_OUTPUT
          echo "clang_package=${CLANG_PACKAGE}" >> $GITHUB_OUTPUT
          echo "clang_archive=${CLANG_ARCHIVE}" >> $GITHUB_OUTPUT
          echo "clang_url=${CLANG_URL}" >> $GITHUB_OUTPUT
          echo "Clang ${CLANG_VERSION}: ${CLANG_URL}"

      - name: Cache LLVM/Clang pre-built
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: /tmp/clang.tar.xz
          key: clang-${{ steps.clang-vars.outputs.clang_version }}-${{ runner.os }}-${{ runner.arch }}

      - name: Download LLVM/Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          echo "Downloading ${{ steps.clang-vars.outputs.clang_url }}"
          wget -q "${{ steps.clang-vars.outputs.clang_url }}" -O /tmp/clang-full.tar.xz

          echo "Extracting only needed files..."
          mkdir -p /tmp/clang
          cd /tmp/clang
          tar -tf /tmp/clang-full.tar.xz | grep -E "(bin/clang|lib/clang)"
          tar -xf /tmp/clang-full.tar.xz \
            --wildcards "*/bin/clang" \
            --wildcards "*/bin/clang-*" \
            --wildcards "*/bin/llvm-objcopy" \
            --wildcards "*/bin/llvm-size" \
            --wildcards "*/lib/clang" \
            --wildcards "*/lib/clang/*/include" \
            --wildcards "*/include" \
            --wildcards '*/include/module.modulemap'

          echo "Creating stripped archive..."
          cd /tmp/clang
          tar -cJf /tmp/clang.tar.xz *

          rm -rf /tmp/clang /tmp/clang-full.tar.xz
          echo "Stripped size:"
          ls -lh /tmp/clang.tar.xz

      - name: Extract Clang
        run: |
          mkdir -p /tmp/clang
          tar -xf /tmp/clang.tar.xz -C /tmp/clang
          CLANG_DIR=$(ls -d /tmp/clang/*-Linux-X64 2>/dev/null || ls -d /tmp/clang/LLVM-* 2>/dev/null)
          echo "CLANG_DIR=$CLANG_DIR" >> $GITHUB_ENV
          echo "Extraction complete!"
          ls -la $CLANG_DIR/bin/ | head -10

      - name: Set Clang PATH
        run: |
          echo "$CLANG_DIR/bin" >> $GITHUB_PATH
          echo "CLANG_DIR=$CLANG_DIR" >> $GITHUB_ENV
          echo "Clang PATH set to $CLANG_DIR/bin"

      - name: Verify Clang
        run: |
          clang --version
          ld.lld --version || true

      - name: Cache ccache deb packages
        id: cache-ccache-clang
        uses: actions/cache@v4
        with:
          path: /tmp/ccache-packages
          key: ccache-packages-${{ runner.os }}-${{ runner.arch }}

      - name: Install ccache from cached packages
        run: |
          if command -v ccache &> /dev/null; then
            echo "ccache already installed"
          elif [ -d "/tmp/ccache-packages" ] && [ -n "$(ls -A /tmp/ccache-packages/*.deb 2>/dev/null)" ]; then
            sudo dpkg -i --force-depends /tmp/ccache-packages/*.deb || true
            sudo apt-get install -f -y -qq --no-install-recommends
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends --download-only ccache
            mkdir -p /tmp/ccache-packages
            cp /var/cache/apt/archives/*.deb /tmp/ccache-packages/
            sudo dpkg -i /tmp/ccache-packages/*.deb
          fi

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ~/.ccache-clang
          key: ccache-obj-clang-${{ steps.clang-vars.outputs.clang_version }}-${{ runner.os }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ccache-obj-clang-${{ steps.clang-vars.outputs.clang_version }}-${{ runner.os }}-

      - name: Build with Clang (ccache)
        run: |
          export PATH="$CLANG_DIR/bin:$PATH"
          export CCACHE_DIR=$HOME/.ccache-clang
          ccache -z > /dev/null
          make -j$(nproc) CC="clang" USE_CLANG=1
          echo ""
          echo "=== ccache statistics ==="
          ccache -s

      - name: Upload Clang artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-clang
          path: |
            build/*.elf
            build/*.bin

  test:
    runs-on: ubuntu-latest
    needs: [build-gcc, build-clang]
    if: |
      always() &&
      (needs.build-gcc.result == 'success' || needs.build-gcc.result == 'skipped') &&
      (needs.build-clang.result == 'success' || needs.build-clang.result == 'skipped') &&
      (needs.build-gcc.result == 'success' || needs.build-clang.result == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Renode
        id: cache-renode
        uses: actions/cache@v4
        with:
          path: /tmp/renode.tar.gz
          key: renode-1.16.1-${{ runner.os }}

      - name: Download Renode portable
        if: steps.cache-renode.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/renode/renode/releases/download/v1.16.1/renode-1.16.1.linux-portable.tar.gz -O /tmp/renode.tar.gz
          echo "Downloaded size:"
          ls -lh /tmp/renode.tar.gz

      - name: Extract Renode
        run: |
          tar -xzf /tmp/renode.tar.gz -C /tmp
          echo "Extraction complete!"

      - name: Add Renode to PATH
        run: echo "/tmp/renode_1.16.1_portable" >> $GITHUB_PATH

      - name: Verify Renode
        run: |
          which renode
          renode --version

      - name: Download GCC artifacts
        if: needs.build-gcc.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: build/

      - name: Download Clang artifacts
        if: needs.build-clang.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-clang
          path: build/

      - name: Run Renode tests
        run: |
          renode --plain --console test/k64_test.resc
          echo "EXIT CODE: $?"
