name: Build K64FX512 Firmware

on:
  workflow_dispatch:
    inputs:
      run_cppcheck:
        description: 'Run static analysis (cppcheck)'
        required: true
        type: choice
        default: 'yes'
        options:
          - 'yes'
          - 'no'
      compiler:
        description: 'Compiler'
        required: true
        type: choice
        default: 'gcc'
        options:
          - 'gcc'
          - 'clang'
          - 'both'
      toolchain_version:
        description: 'ARM GCC Toolchain Version'
        required: true
        type: choice
        default: '15.2.Rel1'
        options:
          - '10.3-2021.10'
          - '11.2-2022.02'
          - '12.2.Rel1'
          - '13.2.Rel1'
          - '13.3.Rel1'
          - '14.2.Rel1'
          - '15.2.Rel1'

env:
  RENODE_VERSION: '1.16.1'

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    if: inputs.run_cppcheck == 'yes'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache cppcheck
        id: cache-cppcheck
        uses: actions/cache@v4
        with:
          path: /usr/bin/cppcheck
          key: cppcheck-${{ runner.os }}-${{ runner.arch }}

      - name: Install cppcheck
        if: steps.cache-cppcheck.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          sudo cp /usr/bin/cppcheck /usr/bin/cppcheck_cached
          sudo mv /usr/bin/cppcheck_cached /usr/bin/cppcheck

      - name: Run cppcheck
        run: make check

  build-gcc:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: |
      always() &&
      (needs.static-analysis.result == 'success' || needs.static-analysis.result == 'skipped') &&
      (inputs.compiler == 'gcc' || inputs.compiler == 'both')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set toolchain paths
        id: paths
        run: |
          VERSION="${{ inputs.toolchain_version }}"
          echo "toolchain_dir=/opt/arm-gnu-toolchain-${VERSION}-x86_64-arm-none-eabi" >> $GITHUB_OUTPUT
          echo "toolchain_file=arm-gnu-toolchain-${VERSION}-x86_64-arm-none-eabi.tar.xz" >> $GITHUB_OUTPUT
          echo "toolchain_url=https://developer.arm.com/-/media/Files/downloads/gnu/${VERSION}/binrel/arm-gnu-toolchain-${VERSION}-x86_64-arm-none-eabi.tar.xz" >> $GITHUB_OUTPUT

      - name: Cache ARM GCC Toolchain
        id: cache-gcc
        uses: actions/cache@v4
        with:
          path: ${{ steps.paths.outputs.toolchain_dir }}
          key: arm-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}-${{ runner.arch }}

      - name: Download and extract ARM GCC
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          echo "Downloading ARM GCC ${{ inputs.toolchain_version }}..."
          wget -q "${{ steps.paths.outputs.toolchain_url }}" -O /tmp/${{ steps.paths.outputs.toolchain_file }}
          echo "Extracting to /opt..."
          sudo mkdir -p /opt
          sudo tar -xf /tmp/${{ steps.paths.outputs.toolchain_file }} -C /opt
          rm /tmp/${{ steps.paths.outputs.toolchain_file }}
          echo "Extraction complete!"
          ls -la ${{ steps.paths.outputs.toolchain_dir }}/bin/ | head -5

      - name: Build with GCC
        run: |
          make -j$(nproc) \
            CC="${{ steps.paths.outputs.toolchain_dir }}/bin/arm-none-eabi-gcc" \
            OBJCOPY="${{ steps.paths.outputs.toolchain_dir }}/bin/arm-none-eabi-objcopy" \
            SIZE="${{ steps.paths.outputs.toolchain_dir }}/bin/arm-none-eabi-size"

      - name: Upload GCC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: |
            build/*.elf
            build/*.bin

  build-clang:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: |
      always() &&
      (needs.static-analysis.result == 'success' || needs.static-analysis.result == 'skipped') &&
      (inputs.compiler == 'clang' || inputs.compiler == 'both')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache LLVM/Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: |
            /usr/lib/llvm-18
            /usr/bin/clang-18
            /usr/bin/llvm-objcopy-18
            /usr/bin/llvm-size-18
          key: llvm-clang-18-${{ runner.os }}-${{ runner.arch }}

      - name: Install LLVM/Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y libstdc++-12-dev-armel-cross
          rm llvm.sh

      - name: Build with Clang
        run: make -j$(nproc) CC=clang-18 USE_CLANG=1

      - name: Upload Clang artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-clang
          path: |
            build/*.elf
            build/*.bin

  test:
    runs-on: ubuntu-latest
    needs: [build-gcc, build-clang]
    if: |
      always() &&
      (needs.build-gcc.result == 'success' || needs.build-gcc.result == 'skipped') &&
      (needs.build-clang.result == 'success' || needs.build-clang.result == 'skipped') &&
      (needs.build-gcc.result == 'success' || needs.build-clang.result == 'success')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Renode
        id: cache-renode
        uses: actions/cache@v4
        with:
          path: renode_${{ env.RENODE_VERSION }}_portable
          key: renode-${{ env.RENODE_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Download Renode portable
        if: steps.cache-renode.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Renode v${{ env.RENODE_VERSION }}..."
          wget -q "https://github.com/renode/renode/releases/download/v${{ env.RENODE_VERSION }}/renode-${{ env.RENODE_VERSION }}.linux-portable.tar.gz"
          echo "Extracting Renode..."
          tar -xzf "renode-${{ env.RENODE_VERSION }}.linux-portable.tar.gz"
          echo "Renode extracted to: $(pwd)/renode_${{ env.RENODE_VERSION }}_portable"
          rm "renode-${{ env.RENODE_VERSION }}.linux-portable.tar.gz"

      - name: Add Renode to PATH
        run: echo "$(pwd)/renode_${{ env.RENODE_VERSION }}_portable" >> $GITHUB_PATH

      - name: Verify Renode
        run: |
          which renode
          renode --version

      - name: Download GCC artifacts
        if: needs.build-gcc.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: build/

      - name: Download Clang artifacts
        if: needs.build-clang.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-clang
          path: build/

      - name: List build artifacts
        run: |
          echo "Build artifacts:"
          ls -la build/ || echo "No build directory"

      - name: Run Renode tests
        run: renode test/k64_test.resc --console
