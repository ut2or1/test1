name: Build K64FX512 Firmware

on:
  workflow_dispatch:
    inputs:
      run_cppcheck:
        description: 'Run static analysis (cppcheck)'
        required: true
        type: choice
        default: 'no'
        options:
          - 'yes'
          - 'no'
      compiler:
        description: 'Compiler'
        required: true
        type: choice
        default: 'gcc'
        options:
          - 'gcc'
          - 'clang'
          - 'both'
      toolchain_version:
        description: 'ARM GCC Toolchain Version'
        required: true
        type: choice
        default: '15.2.Rel1'
        options:
          - '10.3-2021.10'
          - '11.2-2022.02'
          - '12.2.Rel1'
          - '13.2.Rel1'
          - '13.3.Rel1'
          - '14.2.Rel1'
          - '15.2.Rel1'
      clang_version:
        description: 'LLVM/Clang Version'
        required: true
        type: choice
        default: '19.1.0'
        options:
          - '19.1.0'
          - '20.1.0'
          - '21.1.0'
          - '22.1.0'

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    if: inputs.run_cppcheck == 'yes'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache cppcheck deb packages
        id: cache-cppcheck
        uses: actions/cache@v4
        with:
          path: /opt/cppcheck-packages
          key: cppcheck-packages-${{ runner.os }}-${{ runner.arch }}

      - name: Download cppcheck and dependencies
        if: steps.cache-cppcheck.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/cppcheck-packages
          cd /opt/cppcheck-packages
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends --download-only cppcheck
          cp /var/cache/apt/archives/*.deb /opt/cppcheck-packages/

      - name: Install cppcheck from cached packages
        run: |
          if command -v cppcheck &> /dev/null; then
            echo "cppcheck already installed"
          elif [ -d "/opt/cppcheck-packages" ] && [ -n "$(ls -A /opt/cppcheck-packages/*.deb 2>/dev/null)" ]; then
            sudo dpkg -i --force-depends /opt/cppcheck-packages/*.deb || true
            sudo apt-get install -f -y -qq --no-install-recommends
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends cppcheck
          fi

      - name: Run cppcheck
        run: make check

  build-gcc:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: |
      always() &&
      (needs.static-analysis.result == 'success' || needs.static-analysis.result == 'skipped') &&
      (inputs.compiler == 'gcc' || inputs.compiler == 'both')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache ARM GCC Toolchain (7z compressed)
        id: cache-gcc
        uses: actions/cache@v4
        with:
          path: /opt/arm-gnu-toolchain.7z
          key: arm-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}-v2

      - name: Download and compress ARM GCC
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ inputs.toolchain_version }}"
          wget -q "https://developer.arm.com/-/media/Files/downloads/gnu/${VERSION}/binrel/arm-gnu-toolchain-${VERSION}-x86_64-arm-none-eabi.tar.xz" -O /tmp/gcc.tar.xz
          sudo tar -xf /tmp/gcc.tar.xz -C /opt
          rm /tmp/gcc.tar.xz
          GCC_DIR=$(ls -d /opt/arm-gnu-toolchain-*)
          sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full
          sudo 7z a -mx=9 -mmt=on /opt/arm-gnu-toolchain.7z $GCC_DIR
          sudo rm -rf $GCC_DIR
          echo "GCC_DIR=$GCC_DIR" >> $GITHUB_ENV
          echo "Compressed size:"
          ls -lh /opt/arm-gnu-toolchain.7z

      - name: Extract GCC from 7z cache
        if: steps.cache-gcc.outputs.cache-hit == 'true'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full
          sudo 7z x /opt/arm-gnu-toolchain.7z -o/opt/
          GCC_DIR=$(ls -d /opt/arm-gnu-toolchain-*)
          echo "GCC_DIR=$GCC_DIR" >> $GITHUB_ENV
          echo "GCC_DIR from cache: $GCC_DIR"

      - name: Cache ccache deb packages
        id: cache-ccache
        uses: actions/cache@v4
        with:
          path: /opt/ccache-packages
          key: ccache-packages-${{ runner.os }}-${{ runner.arch }}

      - name: Install ccache from cached packages
        run: |
          if command -v ccache &> /dev/null; then
            echo "ccache already installed"
          elif [ -d "/opt/ccache-packages" ] && [ -n "$(ls -A /opt/ccache-packages/*.deb 2>/dev/null)" ]; then
            sudo dpkg -i --force-depends /opt/ccache-packages/*.deb || true
            sudo apt-get install -f -y -qq --no-install-recommends
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends --download-only ccache
            mkdir -p /opt/ccache-packages
            cp /var/cache/apt/archives/*.deb /opt/ccache-packages/
            sudo dpkg -i /opt/ccache-packages/*.deb
          fi

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-obj-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ccache-obj-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}-

      - name: Build with GCC (ccache)
        run: |
          export PATH="$GCC_DIR/bin:$PATH"
          export CCACHE_DIR=$HOME/.ccache
          ccache -z > /dev/null
          make -j$(nproc)
          echo "=== ccache statistics ==="
          ccache -s

      - name: Upload GCC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: |
            build/*.elf
            build/*.bin

  build-clang:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: |
      always() &&
      (needs.static-analysis.result == 'success' || needs.static-analysis.result == 'skipped') &&
      (inputs.compiler == 'clang' || inputs.compiler == 'both')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Clang variables
        id: clang-vars
        run: |
          CLANG_VERSION="${{ inputs.clang_version }}"
          CLANG_PACKAGE="LLVM-${CLANG_VERSION}-Linux-X64"
          CLANG_ARCHIVE="${CLANG_PACKAGE}.tar.xz"
          CLANG_URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${CLANG_VERSION}/${CLANG_ARCHIVE}"

          echo "clang_version=${CLANG_VERSION}" >> $GITHUB_OUTPUT
          echo "clang_package=${CLANG_PACKAGE}" >> $GITHUB_OUTPUT
          echo "clang_archive=${CLANG_ARCHIVE}" >> $GITHUB_OUTPUT
          echo "clang_url=${CLANG_URL}" >> $GITHUB_OUTPUT
          echo "Clang ${CLANG_VERSION}: ${CLANG_URL}"

      - name: Cache LLVM/Clang pre-built (7z compressed)
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: /opt/${{ steps.clang-vars.outputs.clang_package }}.7z
          key: clang-prebuilt-${{ steps.clang-vars.outputs.clang_version }}-${{ runner.os }}-${{ runner.arch }}-v2

      - name: Download and compress LLVM/Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          echo "Downloading ${{ steps.clang-vars.outputs.clang_url }}"
          wget -q "${{ steps.clang-vars.outputs.clang_url }}" -O /tmp/clang.tar.xz
          sudo tar -xf /tmp/clang.tar.xz -C /opt
          rm /tmp/clang.tar.xz
          echo "Compressing with 7z..."
          sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full
          sudo 7z a -mx=9 -mmt=on /opt/${{ steps.clang-vars.outputs.clang_package }}.7z /opt/${{ steps.clang-vars.outputs.clang_package }}
          sudo rm -rf /opt/${{ steps.clang-vars.outputs.clang_package }}
          echo "Compressed size:"
          ls -lh /opt/${{ steps.clang-vars.outputs.clang_package }}.7z

      - name: Extract Clang from 7z cache
        if: steps.cache-clang.outputs.cache-hit == 'true'
        run: |
          echo "Extracting from 7z cache..."
          sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full
          sudo 7z x /opt/${{ steps.clang-vars.outputs.clang_package }}.7z -o/opt/
          echo "Extraction complete!"
          ls -la /opt/${{ steps.clang-vars.outputs.clang_package }}/bin/ | head -5

      - name: Set Clang PATH
        run: |
          CLANG_DIR="/opt/${{ steps.clang-vars.outputs.clang_package }}"
          echo "$CLANG_DIR/bin" >> $GITHUB_PATH
          echo "CLANG_DIR=$CLANG_DIR" >> $GITHUB_ENV
          echo "Clang PATH set to $CLANG_DIR/bin"

      - name: Verify Clang
        run: |
          clang --version || ls -la $CLANG_DIR/bin/

      - name: Cache ccache deb packages
        id: cache-ccache-clang
        uses: actions/cache@v4
        with:
          path: /opt/ccache-packages
          key: ccache-packages-${{ runner.os }}-${{ runner.arch }}

      - name: Install ccache from cached packages
        run: |
          if command -v ccache &> /dev/null; then
            echo "ccache already installed"
          elif [ -d "/opt/ccache-packages" ] && [ -n "$(ls -A /opt/ccache-packages/*.deb 2>/dev/null)" ]; then
            sudo dpkg -i --force-depends /opt/ccache-packages/*.deb || true
            sudo apt-get install -f -y -qq --no-install-recommends
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq --no-install-recommends --download-only ccache
            mkdir -p /opt/ccache-packages
            cp /var/cache/apt/archives/*.deb /opt/ccache-packages/
            sudo dpkg -i /opt/ccache-packages/*.deb
          fi

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ~/.ccache-clang
          key: ccache-obj-clang-${{ steps.clang-vars.outputs.clang_version }}-${{ runner.os }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ccache-obj-clang-${{ steps.clang-vars.outputs.clang_version }}-${{ runner.os }}-

      - name: Build with Clang (ccache)
        run: |
          export PATH="$CLANG_DIR/bin:$PATH"
          export CCACHE_DIR=$HOME/.ccache-clang
          ccache -z > /dev/null
          make -j$(nproc) CC="clang" USE_CLANG=1
          echo "=== ccache statistics ==="
          ccache -s

      - name: Upload Clang artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-clang
          path: |
            build/*.elf
            build/*.bin

  test:
    runs-on: ubuntu-latest
    needs: [build-gcc, build-clang]
    if: |
      always() &&
      (needs.build-gcc.result == 'success' || needs.build-gcc.result == 'skipped') &&
      (needs.build-clang.result == 'success' || needs.build-clang.result == 'skipped') &&
      (needs.build-gcc.result == 'success' || needs.build-clang.result == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Renode (7z compressed)
        id: cache-renode
        uses: actions/cache@v4
        with:
          path: renode_1.16.1_portable.7z
          key: renode-1.16.1-${{ runner.os }}-v2

      - name: Download and compress Renode
        if: steps.cache-renode.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/renode/renode/releases/download/v1.16.1/renode-1.16.1.linux-portable.tar.gz
          tar -xzf renode-1.16.1.linux-portable.tar.gz
          rm renode-1.16.1.linux-portable.tar.gz
          sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full
          7z a -mx=9 -mmt=on renode_1.16.1_portable.7z renode_1.16.1_portable
          rm -rf renode_1.16.1_portable
          echo "Compressed size:"
          ls -lh renode_1.16.1_portable.7z

      - name: Extract Renode from 7z cache
        if: steps.cache-renode.outputs.cache-hit == 'true'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full
          7z x renode_1.16.1_portable.7z
          echo "Extraction complete!"

      - name: Add Renode to PATH
        run: echo "$(pwd)/renode_1.16.1_portable" >> $GITHUB_PATH

      - name: Verify Renode
        run: |
          which renode
          renode --version

      - name: Download GCC artifacts
        if: needs.build-gcc.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: build/

      - name: Download Clang artifacts
        if: needs.build-clang.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-clang
          path: build/

      - name: Run Renode tests
        run: |
          renode --plain --console test/k64_test.resc
          echo "EXIT CODE: $?"
