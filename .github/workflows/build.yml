name: Build K64FX512 Firmware

on:
  workflow_dispatch:
    inputs:
      compiler:
        description: 'Compiler'
        required: true
        type: choice
        default: 'gcc'
        options:
          - 'gcc'
          - 'clang'
          - 'both'
      toolchain_version:
        description: 'ARM GCC Toolchain Version'
        required: true
        type: choice
        default: '15.2.Rel1'
        options:
          - '10.3-2021.10'
          - '11.2-2022.02'
          - '12.2.Rel1'
          - '13.2.Rel1'
          - '13.3.Rel1'
          - '14.2.Rel1'
          - '15.2.Rel1'

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: make check

  build-gcc:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: inputs.compiler == 'gcc' || inputs.compiler == 'both'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GCC Toolchain ${{ inputs.toolchain_version }}
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: ${{ inputs.toolchain_version }}

      - name: Show GCC version
        run: arm-none-eabi-gcc --version

      - name: Build with GCC
        run: make -j$(nproc)

      - name: Upload GCC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: build/*.elf

  build-clang:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: inputs.compiler == 'clang' || inputs.compiler == 'both'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LLVM/Clang
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y libstdc++-12-dev-armel-cross

      - name: Show Clang version
        run: clang-18 --version

      - name: Build with Clang
        run: make -j$(nproc) CC=clang-18 USE_CLANG=1

      - name: Upload Clang artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-clang
          path: build/*.elf
