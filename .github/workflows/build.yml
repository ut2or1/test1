name: Build K64FX512 Firmware

on:
  workflow_dispatch:
    inputs:
      compiler:
        description: 'Compiler'
        required: true
        type: choice
        default: 'gcc'
        options:
          - 'gcc'
          - 'clang'
          - 'both'
      toolchain_version:
        description: 'ARM GCC Toolchain Version'
        required: true
        type: choice
        default: '15.2.Rel1'
        options:
          - '10.3-2021.10'
          - '11.2-2022.02'
          - '12.2.Rel1'
          - '13.2.Rel1'
          - '13.3.Rel1'
          - '14.2.Rel1'
          - '15.2.Rel1'

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache cppcheck
        uses: actions/cache@v4
        with:
          path: /usr/bin/cppcheck
          key: cppcheck-${{ runner.os }}

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: make check

  build-gcc:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: inputs.compiler == 'gcc' || inputs.compiler == 'both'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache ARM GCC Toolchain
        id: cache-gcc
        uses: actions/cache@v4
        with:
          path: /opt/arm-gnu-toolchain-${{ inputs.toolchain_version }}-x86_64-arm-none-eabi
          key: arm-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}

      - name: Download ARM GCC Toolchain
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          wget -q "https://developer.arm.com/-/media/Files/downloads/gnu/${{ inputs.toolchain_version }}/binrel/arm-gnu-toolchain-${{ inputs.toolchain_version }}-x86_64-arm-none-eabi.tar.xz"
          sudo tar -xf arm-gnu-toolchain-${{ inputs.toolchain_version }}-x86_64-arm-none-eabi.tar.xz -C /opt
          rm arm-gnu-toolchain-${{ inputs.toolchain_version }}-x86_64-arm-none-eabi.tar.xz

      - name: Setup ARM GCC symlinks
        run: |
          TOOLCHAIN_DIR="/opt/arm-gnu-toolchain-${{ inputs.toolchain_version }}-x86_64-arm-none-eabi/bin"
          echo "$TOOLCHAIN_DIR" >> $GITHUB_PATH
          sudo ln -sf $TOOLCHAIN_DIR/arm-none-eabi-* /usr/local/bin/

      - name: Verify ARM GCC
        run: arm-none-eabi-gcc --version

      - name: Build with GCC
        run: make -j$(nproc)

      - name: Upload GCC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: |
            build/*.elf
            build/*.bin

  build-clang:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: inputs.compiler == 'clang' || inputs.compiler == 'both'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache LLVM/Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: /usr/lib/llvm-18
          key: llvm-clang-18-${{ runner.os }}

      - name: Install LLVM/Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y libstdc++-12-dev-armel-cross
          rm llvm.sh

      - name: Setup Clang symlinks
        run: |
          sudo ln -sf /usr/bin/clang-18 /usr/local/bin/clang-18
          sudo ln -sf /usr/bin/llvm-objcopy-18 /usr/local/bin/llvm-objcopy-18
          sudo ln -sf /usr/bin/llvm-size-18 /usr/local/bin/llvm-size-18

      - name: Verify Clang
        run: clang-18 --version

      - name: Build with Clang
        run: make -j$(nproc) CC=clang-18 USE_CLANG=1

      - name: Upload Clang artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-clang
          path: |
            build/*.elf
            build/*.bin

  test:
    runs-on: ubuntu-latest
    needs: [build-gcc, build-clang]
    if: always() && (needs.build-gcc.result == 'success' || needs.build-clang.result == 'success')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Renode
        id: cache-renode
        uses: actions/cache@v4
        with:
          path: |
            /usr/bin/renode
            /opt/renode
          key: renode-1.15.0-${{ runner.os }}

      - name: Install Renode
        if: steps.cache-renode.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/renode/renode/releases/download/v1.15.0/renode_1.15.0_amd64.deb
          sudo dpkg -i renode_1.15.0_amd64.deb || sudo apt-get install -f -y
          rm renode_1.15.0_amd64.deb

      - name: Setup Renode symlink
        run: sudo ln -sf /opt/renode/bin/renode /usr/local/bin/renode

      - name: Download GCC artifacts
        if: needs.build-gcc.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: build/

      - name: Download Clang artifacts
        if: needs.build-clang.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-clang
          path: build/

      - name: Run Renode tests
        run: renode --script test/k64_test.resc --console
