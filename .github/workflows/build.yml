name: Build K64FX512 Firmware

on:
  workflow_dispatch:
    inputs:
      run_cppcheck:
        description: 'Run static analysis (cppcheck)'
        required: true
        type: choice
        default: 'no'
        options:
          - 'yes'
          - 'no'
      compiler:
        description: 'Compiler'
        required: true
        type: choice
        default: 'gcc'
        options:
          - 'gcc'
          - 'clang'
          - 'both'
      toolchain_version:
        description: 'ARM GCC Toolchain Version'
        required: true
        type: choice
        default: '15.2.Rel1'
        options:
          - '10.3-2021.10'
          - '11.2-2022.02'
          - '12.2.Rel1'
          - '13.2.Rel1'
          - '13.3.Rel1'
          - '14.2.Rel1'
          - '15.2.Rel1'

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    if: inputs.run_cppcheck == 'yes'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache cppcheck deb packages
        id: cache-cppcheck
        uses: actions/cache@v4
        with:
          path: /opt/cppcheck-packages
          key: cppcheck-packages-${{ runner.os }}-${{ runner.arch }}

      - name: Download cppcheck and dependencies
        if: steps.cache-cppcheck.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/cppcheck-packages
          cd /opt/cppcheck-packages
          sudo apt-get update -qq
          sudo apt-get install -y -qq --download-only cppcheck
          cp /var/cache/apt/archives/*.deb /opt/cppcheck-packages/

      - name: Install cppcheck from cached packages
        run: |
          if [ -d "/opt/cppcheck-packages" ] && [ -n "$(ls -A /opt/cppcheck-packages/*.deb 2>/dev/null)" ]; then
            sudo dpkg -i /opt/cppcheck-packages/*.deb
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq cppcheck
          fi

      - name: Run cppcheck
        run: make check

  build-gcc:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: |
      always() &&
      (needs.static-analysis.result == 'success' || needs.static-analysis.result == 'skipped') &&
      (inputs.compiler == 'gcc' || inputs.compiler == 'both')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache ARM GCC Toolchain
        id: cache-gcc
        uses: actions/cache@v4
        with:
          path: /opt/arm-gnu-toolchain-*
          key: arm-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}

      - name: Download and extract ARM GCC
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ inputs.toolchain_version }}"
          wget -q "https://developer.arm.com/-/media/Files/downloads/gnu/${VERSION}/binrel/arm-gnu-toolchain-${VERSION}-x86_64-arm-none-eabi.tar.xz" -O /tmp/gcc.tar.xz
          sudo tar -xf /tmp/gcc.tar.xz -C /opt
          rm /tmp/gcc.tar.xz
          GCC_DIR=$(ls -d /opt/arm-gnu-toolchain-*)
          echo "GCC_DIR=$GCC_DIR" >> $GITHUB_ENV
          echo "GCC found at: $GCC_DIR"

      - name: Set GCC_DIR from cache
        if: steps.cache-gcc.outputs.cache-hit == 'true'
        run: |
          GCC_DIR=$(ls -d /opt/arm-gnu-toolchain-*)
          echo "GCC_DIR=$GCC_DIR" >> $GITHUB_ENV
          echo "GCC_DIR from cache: $GCC_DIR"

      - name: Cache ccache deb packages
        id: cache-ccache
        uses: actions/cache@v4
        with:
          path: /opt/ccache-packages
          key: ccache-packages-${{ runner.os }}-${{ runner.arch }}

      - name: Install ccache from cached packages
        run: |
          if [ -d "/opt/ccache-packages" ] && [ -n "$(ls -A /opt/ccache-packages/*.deb 2>/dev/null)" ]; then
            sudo dpkg -i /opt/ccache-packages/*.deb
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq --download-only ccache
            mkdir -p /opt/ccache-packages
            cp /var/cache/apt/archives/*.deb /opt/ccache-packages/
            sudo dpkg -i /opt/ccache-packages/*.deb
          fi

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-obj-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ccache-obj-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}-

      - name: Build with GCC (ccache)
        run: |
          export PATH="$GCC_DIR/bin:$PATH"
          export CCACHE_DIR=$HOME/.ccache
          ccache -z > /dev/null
          make -j$(nproc)
          echo "=== ccache statistics ==="
          ccache -s

      - name: Upload GCC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: |
            build/*.elf
            build/*.bin

  build-clang:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: |
      always() &&
      (needs.static-analysis.result == 'success' || needs.static-analysis.result == 'skipped') &&
      (inputs.compiler == 'clang' || inputs.compiler == 'both')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache LLVM/Clang deb packages
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: /opt/clang-packages
          key: clang-packages-18-${{ runner.os }}-${{ runner.arch }}

      - name: Download LLVM/Clang and dependencies
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/clang-packages
          cd /opt/clang-packages
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          rm llvm.sh
          cp /var/cache/apt/archives/*.deb /opt/clang-packages/

      - name: Install LLVM/Clang from cached packages
        run: |
          if [ -d "/opt/clang-packages" ] && [ -n "$(ls -A /opt/clang-packages/*.deb 2>/dev/null)" ]; then
            sudo dpkg -i /opt/clang-packages/*.deb
          else
            wget -q https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh 18
            rm llvm.sh
          fi

      - name: Cache libstdc++-armel-cross deb packages
        id: cache-libstdcpp
        uses: actions/cache@v4
        with:
          path: /opt/libstdcpp-packages
          key: libstdcpp-armel-packages-${{ runner.os }}-${{ runner.arch }}

      - name: Download libstdc++-armel-cross and dependencies
        if: steps.cache-libstdcpp.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/libstdcpp-packages
          cd /opt/libstdcpp-packages
          sudo apt-get update -qq
          sudo apt-get install -y -qq --download-only libstdc++-12-dev-armel-cross
          cp /var/cache/apt/archives/*.deb /opt/libstdcpp-packages/

      - name: Install libstdc++-armel-cross from cached packages
        run: |
          if [ -d "/opt/libstdcpp-packages" ] && [ -n "$(ls -A /opt/libstdcpp-packages/*.deb 2>/dev/null)" ]; then
            sudo dpkg -i /opt/libstdcpp-packages/*.deb
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq libstdc++-12-dev-armel-cross
          fi

      - name: Cache ccache deb packages
        id: cache-ccache-clang
        uses: actions/cache@v4
        with:
          path: /opt/ccache-packages
          key: ccache-packages-${{ runner.os }}-${{ runner.arch }}

      - name: Install ccache from cached packages
        run: |
          if [ -d "/opt/ccache-packages" ] && [ -n "$(ls -A /opt/ccache-packages/*.deb 2>/dev/null)" ]; then
            sudo dpkg -i /opt/ccache-packages/*.deb
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq --download-only ccache
            mkdir -p /opt/ccache-packages
            cp /var/cache/apt/archives/*.deb /opt/ccache-packages/
            sudo dpkg -i /opt/ccache-packages/*.deb
          fi

      - name: Cache ccache objects
        uses: actions/cache@v4
        with:
          path: ~/.ccache-clang
          key: ccache-obj-clang-18-${{ runner.os }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ccache-obj-clang-18-${{ runner.os }}-

      - name: Build with Clang (ccache)
        run: |
          export CCACHE_DIR=$HOME/.ccache-clang
          ccache -z > /dev/null
          make -j$(nproc) CC=clang-18 USE_CLANG=1
          echo "=== ccache statistics ==="
          ccache -s

      - name: Upload Clang artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-clang
          path: |
            build/*.elf
            build/*.bin

  test:
    runs-on: ubuntu-latest
    needs: [build-gcc, build-clang]
    if: |
      always() &&
      (needs.build-gcc.result == 'success' || needs.build-gcc.result == 'skipped') &&
      (needs.build-clang.result == 'success' || needs.build-clang.result == 'skipped') &&
      (needs.build-gcc.result == 'success' || needs.build-clang.result == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Renode
        id: cache-renode
        uses: actions/cache@v4
        with:
          path: renode_1.16.1_portable
          key: renode-1.16.1-${{ runner.os }}

      - name: Download Renode portable
        if: steps.cache-renode.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/renode/renode/releases/download/v1.16.1/renode-1.16.1.linux-portable.tar.gz
          tar -xzf renode-1.16.1.linux-portable.tar.gz
          rm renode-1.16.1.linux-portable.tar.gz

      - name: Add Renode to PATH
        run: echo "$(pwd)/renode_1.16.1_portable" >> $GITHUB_PATH

      - name: Verify Renode
        run: |
          which renode
          renode --version

      - name: Download GCC artifacts
        if: needs.build-gcc.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: build/

      - name: Download Clang artifacts
        if: needs.build-clang.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-clang
          path: build/

      - name: Run Renode tests
        run: |
          renode --plain --console test/k64_test.resc
          echo "EXIT CODE: $?"
