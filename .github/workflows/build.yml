name: Build K64FX512 Firmware

on:
  workflow_dispatch:
    inputs:
      run_cppcheck:
        description: 'Run static analysis (cppcheck)'
        required: true
        type: choice
        default: 'no'
        options:
          - 'yes'
          - 'no'
      compiler:
        description: 'Compiler'
        required: true
        type: choice
        default: 'gcc'
        options:
          - 'gcc'
          - 'clang'
          - 'both'
      toolchain_version:
        description: 'ARM GCC Toolchain Version'
        required: true
        type: choice
        default: '15.2.Rel1'
        options:
          - '10.3-2021.10'
          - '11.2-2022.02'
          - '12.2.Rel1'
          - '13.2.Rel1'
          - '13.3.Rel1'
          - '14.2.Rel1'
          - '15.2.Rel1'

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    if: inputs.run_cppcheck == 'yes'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache cppcheck
        id: cache-cppcheck
        uses: actions/cache@v4
        with:
          path: /usr/bin/cppcheck
          key: cppcheck-${{ runner.os }}

      - name: Install cppcheck
        if: steps.cache-cppcheck.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: make check

  build-gcc:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: |
      always() &&
      (needs.static-analysis.result == 'success' || needs.static-analysis.result == 'skipped') &&
      (inputs.compiler == 'gcc' || inputs.compiler == 'both')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache ARM GCC Toolchain
        id: cache-gcc
        uses: actions/cache@v4
        with:
          path: /opt/arm-gnu-toolchain-*
          key: arm-gcc-${{ inputs.toolchain_version }}-${{ runner.os }}

      - name: Download and extract ARM GCC
        if: steps.cache-gcc.outputs.cache-hit != 'true'
        run: |
          VERSION="${{ inputs.toolchain_version }}"
          wget -q "https://developer.arm.com/-/media/Files/downloads/gnu/${VERSION}/binrel/arm-gnu-toolchain-${VERSION}-x86_64-arm-none-eabi.tar.xz" -O /tmp/gcc.tar.xz
          sudo tar -xf /tmp/gcc.tar.xz -C /opt
          rm /tmp/gcc.tar.xz
          GCC_DIR=$(ls -d /opt/arm-gnu-toolchain-*)
          echo "GCC_DIR=$GCC_DIR" >> $GITHUB_ENV
          echo "GCC found at: $GCC_DIR"

      - name: Set GCC_DIR from cache
        if: steps.cache-gcc.outputs.cache-hit == 'true'
        run: |
          GCC_DIR=$(ls -d /opt/arm-gnu-toolchain-*)
          echo "GCC_DIR=$GCC_DIR" >> $GITHUB_ENV
          echo "GCC_DIR from cache: $GCC_DIR"

      - name: Build with GCC
        run: |
          make -j$(nproc) \
            CC="$GCC_DIR/bin/arm-none-eabi-gcc" \
            OBJCOPY="$GCC_DIR/bin/arm-none-eabi-objcopy" \
            SIZE="$GCC_DIR/bin/arm-none-eabi-size"

      - name: Upload GCC artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: |
            build/*.elf
            build/*.bin

  build-clang:
    runs-on: ubuntu-latest
    needs: static-analysis
    if: |
      always() &&
      (needs.static-analysis.result == 'success' || needs.static-analysis.result == 'skipped') &&
      (inputs.compiler == 'clang' || inputs.compiler == 'both')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache LLVM/Clang
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: |
            /usr/lib/llvm-18
            /usr/bin/clang-18
            /usr/bin/llvm-objcopy-18
            /usr/bin/llvm-size-18
          key: llvm-clang-18-${{ runner.os }}

      - name: Install LLVM/Clang
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y libstdc++-12-dev-armel-cross
          rm llvm.sh

      - name: Build with Clang
        run: make -j$(nproc) CC=clang-18 USE_CLANG=1

      - name: Upload Clang artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k64-firmware-clang
          path: |
            build/*.elf
            build/*.bin

  test:
    runs-on: ubuntu-latest
    needs: [build-gcc, build-clang]
    if: |
      always() &&
      (needs.build-gcc.result == 'success' || needs.build-gcc.result == 'skipped') &&
      (needs.build-clang.result == 'success' || needs.build-clang.result == 'skipped') &&
      (needs.build-gcc.result == 'success' || needs.build-clang.result == 'success')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Renode
        id: cache-renode
        uses: actions/cache@v4
        with:
          path: renode_1.16.1_portable
          key: renode-1.16.1-${{ runner.os }}

      - name: Download Renode portable
        if: steps.cache-renode.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/renode/renode/releases/download/v1.16.1/renode-1.16.1.linux-portable.tar.gz
          tar -xzf renode-1.16.1.linux-portable.tar.gz
          rm renode-1.16.1.linux-portable.tar.gz

      - name: Add Renode to PATH
        run: echo "$(pwd)/renode_1.16.1_portable" >> $GITHUB_PATH

      - name: Verify Renode
        run: |
          which renode
          renode --version

      - name: Download GCC artifacts
        if: needs.build-gcc.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-gcc-${{ inputs.toolchain_version }}
          path: build/

      - name: Download Clang artifacts
        if: needs.build-clang.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: k64-firmware-clang
          path: build/

      - name: Run Renode tests
        run: |
          renode --plain --console test/k64_test.resc
          echo "EXIT CODE: $?"
